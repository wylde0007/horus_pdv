<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hórus PDV - Screenshots</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #101827;
        --muted: #516178;
        --border: #dbe4f0;
        --accent: #0072b1;
        --accent-strong: #075f91;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 24px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      h1 {
        margin: 0;
        font-size: clamp(20px, 3vw, 30px);
        letter-spacing: 0;
      }

      .counter {
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      main {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
        gap: 16px;
        padding: 16px;
      }

      nav {
        display: grid;
        align-content: start;
        gap: 8px;
        max-height: calc(100dvh - 96px);
        overflow-y: auto;
        padding-right: 4px;
      }

      nav button,
      .controls button {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        transition:
          background 0.16s ease,
          border-color 0.16s ease,
          color 0.16s ease,
          transform 0.16s ease;
      }

      nav button {
        min-height: 40px;
        border-radius: 10px;
        padding: 8px 10px;
        text-align: left;
      }

      nav button:hover,
      nav button[aria-current="true"] {
        border-color: color-mix(in srgb, var(--accent) 42%, var(--border));
        background: color-mix(in srgb, var(--accent) 10%, #ffffff);
        color: var(--accent-strong);
      }

      .stage {
        min-width: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }

      .stage-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }

      .stage-title {
        margin: 0;
        font-size: 18px;
      }

      .controls {
        display: flex;
        gap: 8px;
      }

      .controls button {
        min-height: 38px;
        border-radius: 10px;
        padding: 7px 12px;
      }

      .controls button:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      .image-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100dvh - 170px);
        padding: 16px;
        background:
          linear-gradient(45deg, rgba(2, 6, 23, 0.035) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(2, 6, 23, 0.035) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(2, 6, 23, 0.035) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(2, 6, 23, 0.035) 75%);
        background-position:
          0 0,
          0 8px,
          8px -8px,
          -8px 0;
        background-size: 16px 16px;
      }

      img {
        display: block;
        width: min(100%, 1440px);
        max-height: calc(100dvh - 210px);
        object-fit: contain;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: white;
      }

      @media (max-width: 900px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        main {
          grid-template-columns: 1fr;
        }

        nav {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          max-height: none;
          padding-right: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Hórus PDV - Galeria em Slides</h1>
      <span class="counter" id="counter">1 / 1</span>
    </header>

    <main>
      <nav id="thumbs" aria-label="Telas do sistema"></nav>

      <section class="stage" aria-live="polite">
        <div class="stage-header">
          <h2 class="stage-title" id="title">Dashboard</h2>
          <div class="controls">
            <button type="button" id="previous">Anterior</button>
            <button type="button" id="next">Próxima</button>
          </div>
        </div>
        <div class="image-wrap">
          <img id="slide" src="images/dashboard.png" alt="Dashboard do Hórus PDV" />
        </div>
      </section>
    </main>

    <script>
      const slides = [
        ["Login", "images/login.png", "Tela de login do Hórus PDV"],
        ["Dashboard", "images/dashboard.png", "Dashboard do Hórus PDV"],
        ["Clientes", "images/clientes.png", "Cadastro de clientes no Hórus PDV"],
        ["Fornecedores", "images/fornecedores.png", "Cadastro de fornecedores no Hórus PDV"],
        ["Produtos", "images/produtos.png", "Cadastro de produtos no Hórus PDV"],
        ["Usuários", "images/usuarios.png", "Gestão de usuários no Hórus PDV"],
        ["Frente de Caixa", "images/frente-caixa.png", "Frente de caixa do Hórus PDV"],
        ["Histórico de Vendas", "images/historico-vendas.png", "Histórico de vendas do Hórus PDV"],
        ["Relatórios", "images/relatorios.png", "Relatórios do Hórus PDV"],
        ["Fiscal", "images/fiscal.png", "Módulo fiscal do Hórus PDV"],
        ["Pagamentos", "images/pagamentos.png", "Pagamentos integrados do Hórus PDV"],
        ["Estoque", "images/estoque-inventario.png", "Estoque e inventário do Hórus PDV"],
        ["Caixa", "images/abertura-fechamento.png", "Abertura e fechamento de caixa no Hórus PDV"],
        ["Compras", "images/compras-reposicao.png", "Compras e reposição no Hórus PDV"],
        ["Trocas", "images/trocas-devolucoes.png", "Trocas e devoluções no Hórus PDV"],
        ["CRM", "images/crm-fidelidade.png", "CRM e fidelidade no Hórus PDV"],
        ["Omnichannel", "images/omnichannel.png", "Omnichannel no Hórus PDV"],
        ["Minha Empresa", "images/minha-empresa.png", "Página Minha Empresa do Hórus PDV"],
        ["Licença", "images/detalhes-licenca.png", "Detalhes da licença do Hórus PDV"],
        ["Sobre PDV", "images/sobre-pdv.png", "Página Sobre PDV do Hórus PDV"],
        ["Configurações", "images/configuracoes.png", "Configurações do Hórus PDV"],
        ["Perfil", "images/editar-perfil.png", "Perfil do usuário no Hórus PDV"],
      ];

      const title = document.getElementById("title");
      const image = document.getElementById("slide");
      const counter = document.getElementById("counter");
      const thumbs = document.getElementById("thumbs");
      const previous = document.getElementById("previous");
      const next = document.getElementById("next");
      let current = 0;

      const buttons = slides.map((slide, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = slide[0];
        button.addEventListener("click", () => show(index));
        thumbs.append(button);
        return button;
      });

      function show(index) {
        current = (index + slides.length) % slides.length;
        const [label, src, alt] = slides[current];
        title.textContent = label;
        image.src = src;
        image.alt = alt;
        counter.textContent = `${current + 1} / ${slides.length}`;
        buttons.forEach((button, buttonIndex) => {
          button.setAttribute("aria-current", buttonIndex === current ? "true" : "false");
        });
      }

      previous.addEventListener("click", () => show(current - 1));
      next.addEventListener("click", () => show(current + 1));
      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") show(current - 1);
        if (event.key === "ArrowRight") show(current + 1);
      });

      show(0);
    </script>
  </body>
</html>
